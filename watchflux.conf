# WatchFlux Configuration File

# Decoder directories (all *.xml files loaded in sorted order)
decoder_dir = ruleset/decoders

# Rule directories (all *.xml files loaded in sorted order)
rule_dir = ruleset/rules

# Syslog listeners
port = 5140        # UDP
tcp_port = 5141    # TCP (0 = disabled)

# Agent identity
agent = localhost.localdomain
agent_id = 000

# Output files (JSON format)
alerts_file = logs/alerts.json
archives_file = logs/archives.json

# Test mode (optional - can also use -test flag)
# test = your log line here